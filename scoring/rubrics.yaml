      2: "ETR within 0.5% of 24.8%; most line items correct but minor differences in deferred rollforward or rate reconciliation"
      1: "ETR materially wrong; provisions don't tie; deferred rollforward doesn't balance"
    completeness:
      3: "All 4 sheets (Current Provision, Deferred Rollforward, Rate Reconciliation, Summary); every permanent and temporary difference included"
      2: "All sheets present but one is missing line items or the summary lacks a tie-out"
      1: "Missing sheets or major computation steps"
    format_compliance:
      3: "Valid xlsx; standard tax provision workpaper format; clear labeling of assumptions and computations"
      2: "Functional but non-standard layout or unclear labeling"
      1: "Broken file or computations not traceable"
    robustness:
      3: "Correctly derived pre-tax book income from TB; applied blended state rate with apportionment weighting; handled R&D credit offset; all differences correctly classified as permanent vs temporary"
      2: "Most computations correct but missed one difference classification or the blended rate calculation"
      1: "Failed to distinguish permanent vs temporary; incorrect rate application"
