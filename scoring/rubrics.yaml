      3: "All data references accurate (aging buckets, confirmation results, allowance calculations); audit conclusions logically supported by cited evidence; concentration risk identified"
      2: "Most data references correct but 1-2 minor inaccuracies in cited figures; conclusions reasonable"
      1: "Material data errors; conclusions not supported by evidence; missed concentration risk"
    completeness:
      3: "All template sections populated (Objective, Scope, Procedures, Findings, Conclusion); covers confirmation, aging, subsequent receipts, and allowance assessment"
      2: "Template used but one section thin or one procedure area not addressed"
      1: "Template not followed or major sections missing"
    format_compliance:
