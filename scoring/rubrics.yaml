# Cascade Industries Test Suite — Scoring Rubrics
# Per-test-case rubric on 5 dimensions (prompt.md §7.1), plus an optional
# evidence dimension for test cases with evidence_expectations in their gold
# standard (currently TC-19 through TC-21).
# Each dimension is scored 1–3 with concrete anchors referencing gold standards.

dimensions:
  correctness:
    description: "Numerical and factual accuracy against the gold standard"
    generic_anchors:
      3: "All values match gold standard (±0.5% tolerance for computed values)"
      2: "Minor errors that don't change conclusions"
      1: "Material errors in key outputs"

  completeness:
    description: "All requested deliverables and components produced"
    generic_anchors:
      3: "All requested deliverables produced, all components present"
      2: "Missing minor elements (e.g., one sheet, one section)"
      1: "Missing major deliverables or sections"

  format_compliance:
    description: "Valid files, professional formatting, correct file types"
    generic_anchors:
      3: "Valid files, professional formatting, correct file types"
      2: "Functional but poorly formatted, or minor type issues"
      1: "Broken files, wrong file type, or unusable output"

  robustness:
    description: "Handling of edge cases, messy data, format variations, ambiguity"
    generic_anchors:
      3: "Handled all edge cases (messy data, format variations, ambiguity)"
      2: "Handled most edge cases, stumbled on some"
      1: "Failed on edge cases or didn't attempt to handle them"

  communication:
    description: "Proactive explanation of approach, flagged uncertainties, identified errors"
    generic_anchors:
      3: "Proactively explained approach, flagged uncertainties, identified errors"
      2: "Adequate communication, some gaps"
      1: "Silent about approach, missed obvious items to flag"

  evidence:
    description: "Citation of primary sources and use of calibrated professional language (optional; scored only when the gold standard defines evidence_expectations)"
    generic_anchors:
      3: "All required sources cited; acceptable terms present for every finding; primary sources preferred over management summaries"
      2: "Most required sources cited; some findings rely on secondary sources or miss acceptable key terms"
      1: "Required sources not cited; findings unsupported or rely entirely on management summaries"

# ---------------------------------------------------------------------------
# Per-test-case rubrics
# ---------------------------------------------------------------------------

test_cases:

  TC-01:
    title: "Trial Balance Reconciliation"
    service_line: Audit
    difficulty: Complex
    capabilities: [File Reading, Data Analysis, File Writing]
    correctness:
      3: "118 accounts mapped; 3 new / 1 missing / 2 renamed accounts identified; 7 flagged variances match gold list; ERR-001 ($9,000 AR mismatch) caught; largest variance 14.2% on account 4110"
      2: "Accounts mapped within ±2; most variances identified but misses 1-2 flagged accounts or minor rounding differences; ERR-001 detected but amount slightly off"
      1: "Significant mapping errors; misses ERR-001 entirely; incorrect variance calculations or wrong flagged accounts"
    completeness:
      3: "All 4 sheets present (Mapping, Variance Analysis, Exceptions, Tie-Out) with all required content"
      2: "3 of 4 sheets present, or all sheets present but one is missing significant content"
      1: "Missing 2+ sheets or major content gaps in multiple sheets"
    format_compliance:
      3: "Valid xlsx; professional formatting; opens without errors; clean headers and column alignment"
      2: "Valid xlsx but poorly formatted; inconsistent column widths, missing headers, or ugly layout"
      1: "Broken file, wrong file type, or unusable layout"
    robustness:
      3: "Handled merged cells, leading spaces, abbreviations (Accts Recv → Accounts Receivable), renamed accounts, and zero-crossing variance calculations"
      2: "Handled most messy data issues but stumbled on abbreviation mapping or zero-crossing percentages"
      1: "Failed on merged cells or abbreviations; produced garbage from unclean data"
    communication:
      3: "Explained mapping approach; flagged ERR-001 with specific dollar amount; noted renamed accounts and messy data issues; called out zero-crossing variance methodology"
      2: "Mentioned some data quality issues but missed flagging ERR-001 or renamed accounts explicitly"
      1: "Silent about data quality issues; no mention of error or uncertainties"

  TC-02:
    title: "Bank Reconciliation & Confirmation Matching"
    service_line: Audit
    difficulty: Complex
    capabilities: [File Reading, Data Analysis, File Writing]
    correctness:
      3: "Adjusted bank balance = adjusted book balance = $4,287,331; confirmation balance $4,312,117 correctly reconciled; all 4 outstanding checks and 2 deposits in transit identified"
      2: "Balances within ±$500 of gold; most reconciling items found but misses 1 outstanding check or deposit in transit"
      1: "Balances don't agree; material reconciling items missed; confirmation not properly tied"
    completeness:
      3: "Complete reconciliation schedule with all required sections (bank balance → adjusted, book balance → adjusted, confirmation tie); all 340 transactions analyzed"
      2: "Reconciliation present but missing confirmation tie or incomplete transaction matching"
      1: "Incomplete reconciliation; missing major sections"
    format_compliance:
      3: "Valid xlsx; standard bank reconciliation format; professional presentation"
      2: "Functional but non-standard layout or missing section headers"
      1: "Broken file or unusable format"
    robustness:
      3: "Fuzzy-matched transactions across different naming conventions (bank abbreviations vs. company descriptions); handled date offsets (±2 business days); correctly matched by amount"
      2: "Matched most transactions but missed some due to naming differences or date offsets"
      1: "Failed on fuzzy matching; large number of unmatched transactions"
    communication:
      3: "Explained matching methodology; flagged unmatched items; noted confirmation reconciliation logic; identified adjustments needed"
      2: "Adequate explanation of results but missing detail on methodology or unmatched items"
      1: "No explanation of approach; unexplained differences left unaddressed"

  TC-03:
    title: "Substantive Analytical Procedures — Revenue"
    service_line: Audit
    difficulty: Complex
    capabilities: [File Reading, Data Analysis, RAG, File Writing]
    correctness:
      3: "Consolidated revenue growth computed as 9.2% (not 8%); correctly identified management understatement; per-product-line growth rates match gold; declining product line (-4%) identified"
      2: "Growth rate close to 9.2% but rounded differently; identified discrepancy with management claim but analysis imprecise"
      1: "Accepted management's 8% claim without challenge; material errors in growth rate calculations"
    completeness:
      3: "Both Word memo and Excel workbook produced; memo covers all 6 required sections (scope, sources, methodology, findings, conclusion, follow-up); all product lines analyzed monthly and annually"
      2: "Both files produced but memo missing a section or Excel missing a product line"
      1: "Missing one deliverable entirely or both have major gaps"
    format_compliance:
      3: "Professional audit memo format; Excel has clear data tables and charts; proper document structure"
      2: "Functional but memo lacks professional tone or Excel charts are missing/poorly formatted"
      1: "Broken files or unusable output"
    robustness:
      3: "Extracted relevant benchmarks from pages 4, 7, and 11 of the industry report (not just page 1); compared each product line to appropriate benchmark"
      2: "Found some benchmarks but missed data buried on later pages of the report"
      1: "Failed to use industry report or only referenced easily accessible data"
    communication:
      3: "Flagged management representation discrepancy (8% vs 9.2%); discussed whether understatement is rounding vs intentional; recommended follow-up procedures"
      2: "Noted the discrepancy but didn't analyze its significance or recommend follow-up"
      1: "Didn't flag the management representation issue"

  TC-04:
    title: "Lease Extraction & Schedule Population (ASC 842)"
    service_line: Audit
    difficulty: Adversarial
    capabilities: [File Reading, Data Analysis, File Writing]
    correctness:
      3: "All 15 leases extracted with correct terms; 2 short-term exemptions identified; 3 amended leases use amended (not original) terms"
      2: "12-14 leases correct; identifies most amendments but uses original terms for one; short-term exemptions mostly correct"
      1: "Fewer than 12 leases correct; uses original terms for amended leases; misses short-term exemptions"
    completeness:
      3: "Complete lease schedule matching existing format; all 15 leases populated with all required fields (lessee, lessor, commencement, term, rent, escalation, renewal, purchase, termination)"
      2: "Schedule populated but missing fields for some leases or missing 1-2 leases"
      1: "Incomplete schedule with major gaps"
    format_compliance:
      3: "Valid xlsx matching partial schedule format; consistent data entry; opens without errors"
      2: "Functional but format doesn't match existing entries or inconsistent data formatting"
      1: "Broken file or format incompatible with existing schedule"
    robustness:
      3: "Handled all PDF variations (single-column, two-column, scanned-style); flagged OCR uncertainties ($ vs S, 1 vs l) instead of inserting wrong values; processed amendments correctly"
      2: "Handled text-native PDFs well but struggled with scanned PDFs; some OCR errors silently inserted"
      1: "Failed on non-standard PDF layouts; silently inserted OCR errors; missed amendments"
    communication:
      3: "Flagged uncertain extractions from scanned PDFs; noted judgment calls on renewal reasonably-certain determinations; highlighted amended terms vs original"
      2: "Mentioned some uncertainties but not consistently across all problematic leases"
      1: "No flagging of uncertainties; no mention of judgment calls or OCR issues"

  TC-04-EU:
    title: "IFRS 16 Lease Extraction & Schedule Population (European Variant)"
    service_line: Audit
    difficulty: Adversarial
    capabilities: [File Reading, Data Analysis, File Writing]
    correctness:
      3: "All 15 leases extracted with correct terms; 2 short-term exemptions identified; 1 low-value exemption identified with threshold stated; 3 amendments correctly applied; no operating/finance classification (IFRS 16 single model respected)"
      2: "12-14 leases correct; identifies most amendments; may classify some leases as operating/finance; low-value exemption partially identified"
      1: "Fewer than 12 leases correct; applies ASC 842 operating/finance classification; misses low-value exemption entirely"
    completeness:
      3: "Complete IFRS 16 schedule with all required fields (IBR, ROU asset, lease liability); all 15 leases populated; EUR formatting correct"
      2: "Schedule populated but missing IBR/ROU/liability for some leases or missing 1-2 leases; EUR formatting mostly correct"
      1: "Incomplete schedule with major gaps; missing IFRS 16-specific columns"
    format_compliance:
      3: "Valid xlsx matching partial schedule format; consistent EUR formatting; DD.MM.YYYY date conventions; opens without errors"
      2: "Functional but format doesn't match existing entries or mixed date/currency formatting"
      1: "Broken file or format incompatible with existing schedule"
    robustness:
      3: "Handled European date formats (DD.MM.YYYY); correctly parsed EUR amounts with period separator; flagged OCR uncertainties; identified date format ambiguity (DD/MM vs MM/DD)"
      2: "Handled text-native PDFs well but struggled with European formatting; some EUR amounts misinterpreted; date ambiguity not flagged"
      1: "Failed on European date/currency formats; misinterpreted EUR amounts (e.g., 12.500 as 12.5); silently inserted OCR errors"
    communication:
      3: "Flagged uncertain extractions from scanned PDFs; explicitly noted IFRS 16 single model (no operating/finance split); highlighted date format ambiguity; stated low-value threshold (~EUR 4,500)"
      2: "Mentioned some uncertainties but didn't address IFRS 16 vs ASC 842 distinction or low-value threshold"
      1: "No flagging of uncertainties; no mention of IFRS 16 considerations; no discussion of European formatting issues"

  TC-05:
    title: "Audit Workpaper Memo — Accounts Receivable"
    service_line: Audit
    difficulty: Routine
    capabilities: [File Reading, RAG, File Writing]
